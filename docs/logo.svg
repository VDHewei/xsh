<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00d2ff" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)" stroke="url(#accent)" stroke-width="2"/>

  <!-- Terminal window frame -->
  <rect x="36" y="52" width="184" height="152" rx="12" ry="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Terminal title bar -->
  <rect x="36" y="52" width="184" height="28" rx="12" ry="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="36" y="68" width="184" height="12" fill="#161b22"/>

  <!-- Terminal dots -->
  <circle cx="56" cy="66" r="5" fill="#ff5f57"/>
  <circle cx="72" cy="66" r="5" fill="#febc2e"/>
  <circle cx="88" cy="66" r="5" fill="#28c840"/>

  <!-- Terminal prompt $ -->
  <text x="52" y="108" font-family="Courier New, monospace" font-size="18" font-weight="bold" fill="#00d2ff" filter="url(#innerGlow)">$</text>

  <!-- xsh text -->
  <text x="68" y="108" font-family="Courier New, monospace" font-size="18" font-weight="bold" fill="#e6edf3">xsh</text>

  <!-- Task execution lines -->
  <text x="52" y="132" font-family="Courier New, monospace" font-size="12" fill="#7ee787">[GET]</text>
  <text x="96" y="132" font-family="Courier New, monospace" font-size="12" fill="#8b949e">http://api/health</text>

  <text x="52" y="150" font-family="Courier New, monospace" font-size="12" fill="#d2a8ff">@ask:</text>
  <text x="88" y="150" font-family="Courier New, monospace" font-size="12" fill="#8b949e">Continue?</text>

  <text x="52" y="168" font-family="Courier New, monospace" font-size="12" fill="#ffa657">@wait:</text>
  <text x="96" y="168" font-family="Courier New, monospace" font-size="12" fill="#8b949e">10min</text>

  <text x="52" y="186" font-family="Courier New, monospace" font-size="12" fill="#79c0ff">@check:</text>
  <text x="104" y="186" font-family="Courier New, monospace" font-size="12" fill="#8b949e">Verify</text>

  <!-- Blinking cursor -->
  <rect x="134" y="175" width="8" height="14" fill="url(#glow)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- AI brain/circuit indicator -->
  <g transform="translate(190, 36)">
    <circle cx="12" cy="12" r="14" fill="url(#accent)" opacity="0.9" filter="url(#shadow)"/>
    <path d="M6 12 Q9 6 12 8 Q15 10 12 12 Q9 14 12 16 Q15 18 18 12" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="9" cy="10" r="1.5" fill="#fff"/>
    <circle cx="15" cy="14" r="1.5" fill="#fff"/>
  </g>

  <!-- Subtitle -->
  <text x="128" y="230" font-family="Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle" letter-spacing="3">XSH</text>
</svg>
